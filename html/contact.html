<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOSHINAGA FARM</title>
    <link rel="icon" href="/public/img/carrots.png">
    <link rel="stylesheet" href="/public/css/reset.css">
    <link rel="stylesheet" href="/public/css/base.css">
    <link rel="stylesheet" href="/public/css/header.css">
    <link rel="stylesheet" href="/public/css/contact-main.css">
    <link rel="stylesheet" href="/public/css/footer.css">
    <link rel="stylesheet" href="/public/css/animation.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link href="pagefind/pagefind-ui.css" rel="stylesheet">
    <script src="pagefind/pagefind-ui.js" defer></script>
    <script src="/js/calender.js" defer></script>
    <script src="/js/header.js" defer></script>
    <script src="/js/footer.js" defer></script>
</head>

<body>

    <div id="header"></div>

    <div class="animation">
        <div class="animation__nav">
            <div class="animation__list">
                <div class="rotate__vegi fall__vegi vegi1"><img src="/img/carrot.png" alt="人参"></div>
                <div class="rotate__vegi fall__vegi vegi2"><img src="/img/water-melon.png" alt="スイカ"></div>
                <div class="rotate__vegi fall__vegi vegi3"><img src="/img/cabbege.png" alt="キャベツ"></div>
                <div class="rotate__vegi fall__vegi vegi4"><img src="/img/pumpkin.png" alt="カボチャ"></div>
                <div class="rotate__vegi fall__vegi vegi5"><img src="/img/apple.png" alt="リンゴ"></div>
                <div class="rotate__vegi fall__vegi vegi6"><img src="/img/pear.png" alt="梨"></div>
            </div>
        </div>
    </div>
    
    <main class="main">

        <div class="main__inner">

            <section class="main__section">
                <h1 id="main__title--monthly"></h1>

                <div class="main__google-calender">

                    <iframe
                        src="https://calendar.google.com/calendar/embed?src=bba496a0a2db9ec97aa6a8ad5ca6f697611087a9ff8f22d40002a2046331593c%40group.calendar.google.com&ctz=Asia%2FTokyo"
                        style="border: 0" width="300" height="600" frameborder="0" scrolling="no">
                    </iframe>

                </div>

            </section>
            <img class="main__img" src="img/home-img.png" alt="ホームの写真">
        </div>


    </main>

    <div id="footer"></div>

</body>

</html>
